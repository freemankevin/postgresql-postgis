name: PostgreSQL PostGIS CI

permissions:
  contents: write
  packages: write

on:
  schedule:
    - cron: '0 2 * * *'  # Daily version check at 2 AM
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Scripts/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL version (empty for all)'
        required: false
        type: choice
        options: ['all', '14', '15', '16', '17', '18']
        default: 'all'
      force_rebuild:
        description: 'Force rebuild'
        required: false
        type: boolean
        default: false
      skip_cleanup:
        description: 'Skip cleanup old images'
        required: false
        type: boolean
        default: false

jobs:
  # Job 1: Check versions and update README
  check-versions:
    name: Check versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Check PostgreSQL version updates
        id: check
        run: python Scripts/build-helper.py check-versions
      
      - name: Commit version changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          if ! git diff --quiet pg_version.json; then
            git add pg_version.json
            git commit -m "chore: Update PostgreSQL versions ($(date '+%Y-%m-%d'))"
            git push
          fi
      
      - name: Update README version table
        run: python Scripts/update-readme-versions.py
      
      - name: Commit README changes
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "GitHub Action"
            git config user.email "action@github.com"
            git add README.md
            git commit -m "docs: Update version table"
            git push
          fi
      
      - name: Generate build matrix
        id: matrix
        run: |
          VERSION="${{ inputs.pg_version }}"
          python Scripts/build-helper.py matrix ${VERSION:-all}

  # Job 2: Build images
  build:
    name: Build PG ${{ matrix.version }}
    needs: check-versions
    if: |
      needs.check-versions.outputs.changed == 'true' || 
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.check-versions.outputs.matrix) }}
      fail-fast: false
      max-parallel: 6
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Check if build needed
        id: check
        run: |
          ARGS="--manual"
          [ "${{ inputs.force_rebuild }}" = "true" ] && ARGS="$ARGS --force"
          python Scripts/build-helper.py should-build ${{ matrix.version }} $ARGS
      
      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.should_build == 'true'
      
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.should_build == 'true'
      
      - name: Login to GHCR
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup old image versions
        if: |
          steps.check.outputs.should_build == 'true' &&
          inputs.skip_cleanup != true
        run: python Scripts/build-helper.py cleanup ${{ matrix.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push image
        if: steps.check.outputs.should_build == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker buildx build \
              --push \
              --tag ghcr.io/${{ github.repository_owner }}/postgresql-postgis:${{ steps.check.outputs.version }} \
              --platform linux/amd64,linux/arm64 \
              --build-arg PG_MAJOR=${{ matrix.version }} \
              --build-arg PG_VERSION=${{ steps.check.outputs.version }} \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .
      
      - name: Generate build summary
        run: |
          BUILT="${{ steps.check.outputs.should_build }}"
          python Scripts/build-helper.py summary ${{ matrix.version }} ${BUILT:-false}